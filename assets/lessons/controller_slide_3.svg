<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#f5f2ea"/>
  <text x="700" y="78" text-anchor="middle" font-family="DejaVu Sans" font-size="42" font-weight="700" fill="#1f2b33">Регулировщик: правая рука вперед</text>
  
        <rect x="90" y="130" width="560" height="760" rx="28" fill="#fffdf8" stroke="#d8ccb1" stroke-width="4"/>
        
    <circle cx="370" cy="310" r="30" fill="#f0c9a4" stroke="#1f2b33" stroke-width="8"/>
    <line x1="370" y1="340" x2="370" y2="490" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="390" x2="290" y2="490" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="390" x2="520" y2="430" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="490" x2="315" y2="610" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="490" x2="425" y2="610" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    
        <text x="760" y="190" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">Левый бок:</text>
<text x="760" y="236" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">можно во всех направлениях</text>
        <text x="760" y="360" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">Грудь:</text>
<text x="760" y="406" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">только направо</text>
        <text x="760" y="520" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">Спина и правый бок:</text>
<text x="760" y="566" text-anchor="start" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">движение запрещено</text>
        <text x="760" y="700" text-anchor="start" font-family="DejaVu Sans" font-size="26" fill="#1f2b33">Главное правило темы:</text>
<text x="760" y="740" text-anchor="start" font-family="DejaVu Sans" font-size="26" fill="#1f2b33">регулировщик всегда выше</text>
<text x="760" y="780" text-anchor="start" font-family="DejaVu Sans" font-size="26" fill="#1f2b33">светофора, знаков и разметки</text>
        
</svg>
