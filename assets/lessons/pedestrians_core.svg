<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#edf5ef"/>
  <text x="700" y="85" text-anchor="middle" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#1f3326">Пешеходы и маршрутный транспорт</text>
  <rect x="120" y="180" width="1160" height="260" rx="28" fill="#4e5861"/>
  <rect x="240" y="225" width="60" height="170" fill="#ffffff"/>
  <rect x="380" y="225" width="60" height="170" fill="#ffffff"/>
  <rect x="520" y="225" width="60" height="170" fill="#ffffff"/>
  <rect x="660" y="225" width="60" height="170" fill="#ffffff"/>
  <rect x="800" y="225" width="60" height="170" fill="#ffffff"/>
  <rect x="940" y="225" width="60" height="170" fill="#ffffff"/>
  <circle cx="620" cy="270" r="22" fill="#2c8b72"/>
  <line x1="620" y1="295" x2="620" y2="355" stroke="#2c8b72" stroke-width="12"/>
  <line x1="620" y1="320" x2="580" y2="345" stroke="#2c8b72" stroke-width="12"/>
  <line x1="620" y1="320" x2="660" y2="345" stroke="#2c8b72" stroke-width="12"/>
  <line x1="620" y1="355" x2="590" y2="405" stroke="#2c8b72" stroke-width="12"/>
  <line x1="620" y1="355" x2="650" y2="405" stroke="#2c8b72" stroke-width="12"/>
  <text x="700" y="505" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#1f3326">На нерегулируемом переходе уступай пешеходу, который уже идёт или только вступил на проезжую часть</text>
  <rect x="170" y="590" width="420" height="210" rx="26" fill="#2c8b72"/>
  <text x="380" y="690" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">Если впереди кто-то</text>
  <text x="380" y="730" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">тормозит перед переходом,</text>
  <text x="380" y="770" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">тоже снижай скорость</text>
  <rect x="800" y="590" width="430" height="210" rx="26" fill="#456b8c"/>
  <text x="1015" y="690" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">Автобус от остановки</text>
  <text x="1015" y="730" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">имеет преимущество</text>
  <text x="1015" y="770" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#ffffff">в населённом пункте</text>
</svg>
