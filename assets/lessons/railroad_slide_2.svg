<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#f7f0ed"/>
  <text x="700" y="78" text-anchor="middle" font-family="DejaVu Sans" font-size="42" font-weight="700" fill="#1f2b33">Ж/д переезд: где остановиться</text>
  
        <line x1="250" y1="650" x2="1150" y2="650" stroke="#5b6166" stroke-width="16"/>
        <line x1="250" y1="720" x2="1150" y2="720" stroke="#5b6166" stroke-width="16"/>
        <line x1="450" y1="450" x2="450" y2="610" stroke="#d9432c" stroke-width="18"/>
        <line x1="820" y1="430" x2="820" y2="610" stroke="#2c8b72" stroke-width="18"/>
        <text x="310" y="400" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">5 м до шлагбаума</text>
        <text x="690" y="400" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">10 м до ближайшего рельса,</text>
<text x="690" y="444" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">если шлагбаума нет</text>
        <text x="700" y="860" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">На переезде выбирай остановку раньше, а не рискованный проезд позже</text>
        
</svg>
