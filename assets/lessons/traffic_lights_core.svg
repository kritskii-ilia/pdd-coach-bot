<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#eef4f1"/>
  <text x="700" y="90" text-anchor="middle" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#18302b">Светофор и допсекция</text>
  <rect x="150" y="170" width="260" height="560" rx="40" fill="#222831"/>
  <circle cx="280" cy="290" r="75" fill="#d93b2d"/>
  <circle cx="280" cy="450" r="75" fill="#f0c419"/>
  <circle cx="280" cy="610" r="75" fill="#2ca25f"/>
  <text x="530" y="300" font-family="DejaVu Sans" font-size="30" fill="#18302b">Красный / красный+жёлтый</text>
  <text x="530" y="340" font-family="DejaVu Sans" font-size="26" fill="#18302b">Движение запрещено</text>
  <text x="530" y="470" font-family="DejaVu Sans" font-size="30" fill="#18302b">Жёлтый</text>
  <text x="530" y="510" font-family="DejaVu Sans" font-size="26" fill="#18302b">Остановка, кроме безопасного завершения манёвра</text>
  <text x="530" y="640" font-family="DejaVu Sans" font-size="30" fill="#18302b">Зелёный</text>
  <text x="530" y="680" font-family="DejaVu Sans" font-size="26" fill="#18302b">Движение разрешено</text>
  <rect x="980" y="220" width="220" height="360" rx="32" fill="#222831"/>
  <polygon points="1090,315 1160,370 1090,425" fill="#2ca25f"/>
  <text x="1090" y="640" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#18302b">Допсекция направо</text>
  <text x="1090" y="690" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#18302b">Ехать можно</text>
  <text x="1090" y="725" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#18302b">Но при красном основном сигнале</text>
  <text x="1090" y="760" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#18302b">нужно уступить другим</text>
</svg>
