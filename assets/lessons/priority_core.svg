<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#f7f2ea"/>
  <text x="700" y="90" text-anchor="middle" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#2b2d33">Как разбирать приоритет</text>
  <g font-family="DejaVu Sans" fill="#2b2d33">
    <rect x="180" y="170" width="1040" height="120" rx="24" fill="#c84c2b"/>
    <rect x="180" y="330" width="1040" height="120" rx="24" fill="#de9b22"/>
    <rect x="180" y="490" width="1040" height="120" rx="24" fill="#2c8b72"/>
    <rect x="180" y="650" width="1040" height="120" rx="24" fill="#4d6f94"/>
    <text x="700" y="245" text-anchor="middle" font-size="34" fill="#fff">1. Есть регулировщик или временный знак?</text>
    <text x="700" y="405" text-anchor="middle" font-size="34" fill="#fff">2. Если нет: кто на главной дороге?</text>
    <text x="700" y="565" text-anchor="middle" font-size="34" fill="#fff">3. Если дороги равны: помеха справа</text>
    <text x="700" y="725" text-anchor="middle" font-size="34" fill="#fff">4. При левом повороте уступи встречным</text>
    <text x="700" y="875" text-anchor="middle" font-size="30">Решай сверху вниз. Не начинай задачу сразу с «помехи справа».</text>
  </g>
</svg>
