<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#f5f2ea"/>
  <text x="700" y="78" text-anchor="middle" font-family="DejaVu Sans" font-size="42" font-weight="700" fill="#1f2b33">Регулировщик: рука вверх</text>
  
        <rect x="90" y="130" width="560" height="760" rx="28" fill="#fffdf8" stroke="#d8ccb1" stroke-width="4"/>
        
    <circle cx="370" cy="310" r="30" fill="#f0c9a4" stroke="#1f2b33" stroke-width="8"/>
    <line x1="370" y1="340" x2="370" y2="490" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="390" x2="280" y2="490" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="390" x2="370" y2="240" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="490" x2="315" y2="610" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="490" x2="425" y2="610" stroke="#1f2b33" stroke-width="16" stroke-linecap="round"/>
    
        <text x="760" y="240" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">Рука поднята вверх</text>
<text x="760" y="284" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">Движение запрещено всем</text>
<text x="760" y="328" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">Исключение: если уже нельзя</text>
<text x="760" y="372" text-anchor="start" font-family="DejaVu Sans" font-size="30" fill="#1f2b33">остановиться без экстренного торможения</text>
        <text x="760" y="520" text-anchor="start" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">Смотри не на фразу, а на картинку:</text>
<text x="760" y="562" text-anchor="start" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">поднятая рука = общая пауза</text>
<text x="760" y="604" text-anchor="start" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">для всех направлений</text>
        
</svg>
