<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#f6f4ef"/>
  <text x="700" y="85" text-anchor="middle" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#2d3138">Остановка и стоянка</text>
  <rect x="130" y="180" width="540" height="680" rx="28" fill="#fffdf9" stroke="#dbd0b7" stroke-width="4"/>
  <circle cx="400" cy="370" r="120" fill="#d9432c"/>
  <line x1="320" y1="450" x2="480" y2="290" stroke="#ffffff" stroke-width="26"/>
  <text x="400" y="600" text-anchor="middle" font-family="DejaVu Sans" font-size="30" fill="#2d3138">Нельзя</text>
  <text x="400" y="650" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#2d3138">Переход и 5 м перед ним</text>
  <text x="400" y="690" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#2d3138">Перекрёсток и 5 м от края</text>
  <text x="400" y="730" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#2d3138">Мешает обзору, знакам, пешеходам</text>
  <rect x="730" y="180" width="540" height="680" rx="28" fill="#fffdf9" stroke="#dbd0b7" stroke-width="4"/>
  <text x="1000" y="320" text-anchor="middle" font-family="DejaVu Sans" font-size="34" font-weight="700" fill="#2d3138">Как быстро различать</text>
  <text x="1000" y="420" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#2d3138">Остановка</text>
  <text x="1000" y="460" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#2d3138">до 5 минут или для посадки/высадки</text>
  <text x="1000" y="560" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#2d3138">Стоянка</text>
  <text x="1000" y="600" text-anchor="middle" font-family="DejaVu Sans" font-size="24" fill="#2d3138">дольше 5 минут без этих причин</text>
  <text x="1000" y="720" text-anchor="middle" font-family="DejaVu Sans" font-size="26" fill="#2d3138">Сначала ищи опасность для обзора и манёвра другим</text>
</svg>
