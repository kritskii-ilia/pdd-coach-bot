<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1600" viewBox="0 0 1400 1600">
  <rect width="1400" height="1600" fill="#f6f3ea"/>
  <text x="700" y="85" text-anchor="middle" font-family="DejaVu Sans" font-size="44" font-weight="700" fill="#1d2a33">Регулировщик: 4 положения</text>
  <g font-family="DejaVu Sans" fill="#1d2a33">
    <rect x="70" y="130" width="600" height="620" rx="28" fill="#fffdf8" stroke="#d9c9a8" stroke-width="4"/>
    <text x="370" y="190" text-anchor="middle" font-size="30" font-weight="700">Рука вверх</text>
    <line x1="370" y1="270" x2="370" y2="420" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <circle cx="370" cy="240" r="30" fill="#f0c9a4" stroke="#1d2a33" stroke-width="8"/>
    <line x1="370" y1="290" x2="370" y2="140" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="300" x2="280" y2="360" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="420" x2="310" y2="540" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="420" x2="430" y2="540" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <text x="370" y="620" text-anchor="middle" font-size="26">Движение запрещено всем</text>

    <rect x="730" y="130" width="600" height="620" rx="28" fill="#fffdf8" stroke="#d9c9a8" stroke-width="4"/>
    <text x="1030" y="190" text-anchor="middle" font-size="30" font-weight="700">Руки в стороны</text>
    <line x1="1030" y1="270" x2="1030" y2="420" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <circle cx="1030" cy="240" r="30" fill="#f0c9a4" stroke="#1d2a33" stroke-width="8"/>
    <line x1="1030" y1="300" x2="920" y2="300" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="1030" y1="300" x2="1140" y2="300" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="1030" y1="420" x2="970" y2="540" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="1030" y1="420" x2="1090" y2="540" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <text x="1030" y="598" text-anchor="middle" font-size="26">С боков: прямо и направо</text>
    <text x="1030" y="635" text-anchor="middle" font-size="26">Грудь и спина закрыты</text>

    <rect x="70" y="810" width="600" height="620" rx="28" fill="#fffdf8" stroke="#d9c9a8" stroke-width="4"/>
    <text x="370" y="870" text-anchor="middle" font-size="30" font-weight="700">Правая рука вперед</text>
    <line x1="370" y1="950" x2="370" y2="1100" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <circle cx="370" cy="920" r="30" fill="#f0c9a4" stroke="#1d2a33" stroke-width="8"/>
    <line x1="370" y1="980" x2="500" y2="980" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="980" x2="290" y2="1040" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="1100" x2="310" y2="1220" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <line x1="370" y1="1100" x2="430" y2="1220" stroke="#1d2a33" stroke-width="16" stroke-linecap="round"/>
    <text x="370" y="1280" text-anchor="middle" font-size="26">Левый бок: все направления</text>
    <text x="370" y="1317" text-anchor="middle" font-size="26">Грудь: только направо</text>

    <rect x="730" y="810" width="600" height="620" rx="28" fill="#fffdf8" stroke="#d9c9a8" stroke-width="4"/>
    <text x="1030" y="870" text-anchor="middle" font-size="30" font-weight="700">Порядок приоритета</text>
    <rect x="845" y="940" width="370" height="78" rx="18" fill="#c84c2b"/>
    <rect x="845" y="1040" width="370" height="78" rx="18" fill="#e0a12a"/>
    <rect x="845" y="1140" width="370" height="78" rx="18" fill="#2a7f62"/>
    <rect x="845" y="1240" width="370" height="78" rx="18" fill="#456b8c"/>
    <text x="1030" y="990" text-anchor="middle" font-size="28" font-family="DejaVu Sans" fill="#fff">Регулировщик</text>
    <text x="1030" y="1090" text-anchor="middle" font-size="28" font-family="DejaVu Sans" fill="#fff">Светофор</text>
    <text x="1030" y="1190" text-anchor="middle" font-size="28" font-family="DejaVu Sans" fill="#fff">Знаки</text>
    <text x="1030" y="1290" text-anchor="middle" font-size="28" font-family="DejaVu Sans" fill="#fff">Разметка</text>
  </g>
