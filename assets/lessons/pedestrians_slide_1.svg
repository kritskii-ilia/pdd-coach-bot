        <text x="700" y="560" text-anchor="middle" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">Если пешеход уже идёт или только вступил на проезжую часть,</text>
<text x="700" y="606" text-anchor="middle" font-family="DejaVu Sans" font-size="32" fill="#1f2b33">ты обязан уступить</text>
        <text x="700" y="720" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">Если машина впереди тормозит перед переходом,</text>
<text x="700" y="762" text-anchor="middle" font-family="DejaVu Sans" font-size="28" fill="#1f2b33">считай ситуацию потенциально опасной</text>
        
